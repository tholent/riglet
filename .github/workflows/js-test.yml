name: JS Test

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - '.github/workflows/js-test.yml'
  pull_request:
    paths:
      - 'ui/**'
      - '.github/workflows/js-test.yml'

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
